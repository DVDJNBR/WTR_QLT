name: Deploy to VPS

on:
  push:
    branches: [main]
    paths:
      - "app/**"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Rsync app vers VPS
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avz --exclude='data/' --exclude='__pycache__/' --exclude='*.pyc'
          path: app/
          remote_path: /home/ubuntu/qlt-eau/app/
          remote_host: 91.134.43.150
          remote_user: ubuntu
          remote_key: ${{ secrets.VPS_SSH_KEY }}

      - name: Rebuild et restart Streamlit
        uses: appleboy/ssh-action@v1
        with:
          host: 91.134.43.150
          username: ubuntu
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /home/ubuntu/qlt-eau
            docker compose build --no-cache streamlit
            docker compose up -d
