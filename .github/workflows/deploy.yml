name: Deploy to VPS

on:
  push:
    branches: [main]
    paths:
      - "app/**"
  pull_request:
    types:
      - closed
    branches: [main]
    paths:
      - "app/**"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    steps:
      - uses: actions/checkout@v4

      - name: Rsync app vers VPS
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avz --exclude='data/' --exclude='__pycache__/' --exclude='*.pyc'
          path: app/
          remote_path: /home/ubuntu/qlt-eau/app/
          remote_host: ${{ secrets.VPS_IP }}
          remote_user: ubuntu
          remote_key: ${{ secrets.VPS_SSH_KEY }}

      - name: Rebuild et restart Streamlit
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_IP }}
          username: ubuntu
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /home/ubuntu/qlt-eau
            docker compose build --no-cache streamlit
            docker compose up -d
